# GitHub Actions workflow for CI/CD: Lint, Test, Terraform, Deploy
name: Agentic App CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Agents/requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 Agents/main.py
      - name: Test (placeholder)
        run: echo "No tests yet"

  terraform:
    needs: build-test
    runs-on: ubuntu-latest
    environment: production
    env:
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'
      - name: Create Terraform Backend Storage
        run: |
          az storage account create --name agentictfstate --resource-group AITest --location ukwest --sku Standard_LRS --allow-blob-public-access false 2>/dev/null || true
          az storage container create --name tfstate --account-name agentictfstate 2>/dev/null || true
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        working-directory: Agents/infra
        run: terraform init
      - name: Terraform Apply
        working-directory: Agents/infra
        run: terraform apply -auto-approve

  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'
      - name: Create deployment package
        run: |
          cd Agents
          zip -r ../deploy.zip . -x "infra/*" "__pycache__/*" ".env"
      - name: Deploy to Azure App Service
        run: |
          az webapp deploy --resource-group AITest --name agentic-appservice --src-path deploy.zip --type zip --async true
